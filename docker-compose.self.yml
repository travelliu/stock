# Local dev: starts MySQL only.
# Run the Go server directly: go run ./cmd/stockd
#
# Usage:
#   make dev-up     # start MySQL
#   make dev-down   # stop MySQL

name: stock

services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-stockd}
      MYSQL_USER: ${MYSQL_USER:-stockd}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - data/mysql/:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      retries: 10
